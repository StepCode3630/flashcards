version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: flashcards_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_flashCards
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashcards_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_DATABASE: db_flashCards
    ports:
      - "3333:3333" # Adonis default
    volumes:
      - .:/usr/src/app
    command: ["npm", "run", "dev"]

volumes:
  db_data:
